<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 240px;
      padding: 14px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #e8e8e8;
      margin: 0;
    }
    .logo { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
    .mark {
      width:24px; height:24px; background:#7c6ff7; border-radius:6px;
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:700; color:#fff;
    }
    .name  { font-size:14px; font-weight:600; }
    .hint  { font-size:11px; color:#666; line-height:1.6; }
    .hint strong { color:#a0a0a0; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="mark">M</div>
    <span class="name">MimicAPI</span>
  </div>
  <p class="hint">
    Open <strong>DevTools → MimicAPI tab</strong><br>
    to view captured traffic and generate your OpenAPI spec.
  </p>
</body>
</html>
